<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* container holds all products in a flex layout */
        #product-container {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 10px;
        }

        /* individual product card */
        .product {
            border: 1px solid black;
            padding: 6px;
            border-radius: 10px;
            height: 250px;
            width: 140px;
            cursor: pointer;
            text-align: center;
            display: grid;
        }

        .product img {
            border-radius: 10px;
        }

        .product p {
            height: 38px;
            width: 120px;
            overflow: hidden;
            margin: 4px auto;
        }

        button:hover {
            background-color: rgba(255, 255, 0, 0.5);
        }

        button {
            border: 0.5px solid black;
            border-radius: 50px;
            padding: 5px;
            background-color: yellow;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- flex container for product cards -->
    <div id="product-container"></div>

    <!-- controls -->
    <button onclick="onclickHandler()">Add product</button>

    <script>
        // initial product list
        const products = [
            {
                img: 'ryan-waring-164_6wVEHfI-unsplash.jpg',
                name: 'ryan-warning-164wtj-unsplash'
            }
        ];

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product';

                const img = document.createElement('img');
                img.src = p.img;
                img.alt = p.name;
                img.height = 150;
                img.width = 140;

                const pElem = document.createElement('p');
                pElem.textContent = p.name;

                const btn = document.createElement('button');
                btn.textContent = 'Buy Now';

                div.append(img, pElem, btn);
                container.appendChild(div);
            });
        }

        function onclickHandler() {
            // always add a product with the same details as the first item
            if (products.length > 0) {
                const first = products[0];
                products.push({ img: first.img, name: first.name });
                renderProducts();
            }
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
