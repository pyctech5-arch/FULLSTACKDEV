<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JavaScript Scope Clean Version</title>
</head>
<body>

<p id="d1"></p>
<p id="demo1"></p>
<p id="demo2"></p>
<p id="a1"></p>
<p id="a2"></p>
<p id="a3"></p>
<p id="a4"></p>
<p id="a5"></p>
<p id="a6"></p>
<p id="a7"></p>
<p id="a8"></p>
<p id="a9"></p>
<p id="a10"></p>
<p id="a11"></p>
<p id="a12"></p>
<p id="a13"></p>
<p id="p1"></p>
<script>
"use strict";

/* GLOBAL SCOPE */
var x = 1;
let y = 2;
const z = 3;

let carName2 = "Volvo";

function myFunction() {
  document.getElementById("d1").innerHTML =
    "I can display " + carName2;
}
myFunction();

/* FUNCTION SCOPE */
function myFunction1() {
  let carName1 = "BMW";
  document.getElementById("demo1").innerHTML =
    typeof carName1 + " " + carName1;
}
myFunction1();

document.getElementById("demo2").innerHTML =
  typeof carName2;

/* GLOBAL VARIABLE EXAMPLE */
var carName3 = "Audi";
document.getElementById("a1").innerHTML =
  "I can display " + carName3;

/* WINDOW OBJECT */
document.getElementById("a2").innerHTML =
  "Window access: " + window.carName3;

/* FUNCTION BLOCK */
function multiply(p1, p2) {
  return p1 * p2;
}
let result = multiply(4, 3);
document.getElementById("a3").innerHTML =
  "The result is: " + result;

/* IF BLOCK */
const hour = new Date().getHours();
let greeting;
if (hour < 18) {
  greeting = "Good Day";
} else {
  greeting = "Good Evening";
}
document.getElementById("a4").innerHTML = greeting;

/* FOR LOOP */
let text = "";
for (let i = 0; i < 5; i++) {
  text += "The number is " + i + "<br>";
}
document.getElementById("a5").innerHTML = text;

/* WHILE LOOP */
let text1 = "";
let i = 0;
while (i < 5) {
  text1 += "The number is " + i + "<br>";
  i++;
}
document.getElementById("a6").innerHTML = text1;

/* BLOCK SCOPE */
{
  let blockVar = 10;
}
document.getElementById("a7").innerHTML =
  "blockVar is " + typeof blockVar;

/* STANDALONE BLOCK */
{
  let x = 10;
  let y = 100;
  let area = x * y;
  document.getElementById("a8").innerHTML =
    "Area is " + area;
}

/* HOISTING */
hoistVar = 5;
var hoistVar;
document.getElementById("a9").innerHTML =
  "Hoisted var: " + hoistVar;

var x2 = 5;
var y2;
document.getElementById("a10").innerHTML =
  "x2 is " + x2 + " and y2 is " + y2;
y2 = 7;

var xa = 5;
var ya;
document.getElementById("a11").innerHTML =
  xa + " " + ya;
ya = 7;

document.getElementById("a12").innerHTML =
  "ya after assignment: " + ya;

document.getElementById("a13").innerHTML =
  "Script executed successfully ✔";

"use strict";
x1u = 3.14;  // This will cause an error (x is not defined).

</script>

</body>
</html>
