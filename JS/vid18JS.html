/*Local Variables has Function Scope
They can only be accessed from within the function
No scripts or functions outside the function can access them
Variables with the same name can be used outside the function
Variables with the same name can be used in different functions
Local variables are created when a function starts
Local variables are deleted when the function is completed
Arguments (parameters) work as local variables inside functions
Block Scope
Before ES6, JavaScript variables could only have Global Scope or Function Scope.

ES6 introduced two important new JavaScript keywords: let and const.

These two keywords provide Block Scope in JavaScript.

Variables declared with let and const inside a code block are "block-scoped," meaning they are only accessible within that block.

This helps prevent unintended variable overwrites and promotes better code organization:

Example:
Variables declared with the var keyword can NOT have block scope.

Variables declared with the var keyword, inside a { } block; can be accessed from outside the block.

Automatically Global
If you assign a value to a variable that has not been declared, it will become a GLOBAL variable.

This code example will declare a global variable carName, even if the value is assigned inside a function.

Example*/
myFunctiona();
// code here can use carName as a global variable
document.getElementById("a1").innerHTML = "I can display " + carName1;

function myFunctiona() {
  carName1 = "Volvo";
}
/*Strict Mode
All modern browsers support running JavaScript in "Strict Mode".

In "Strict Mode", undeclared variables are not automatically global.

Global Variables in HTML
With JavaScript, the global scope is the JavaScript environment.

In HTML, the global scope is the window object.

Global variables defined with the var keyword belong to the window object:

Example (Not Recommended)*/
var carName3 = "Volvo";

// code here can use window.carName
document.getElementById("a2").innerHTML = "I can display " + window.carName3;
// Global variables defined with the let keyword do not belong to the window object:
// Example
let carNamu = "Volvo";
/*Warning
Do NOT create global variables unless you intend to.

Your global variables (or functions) can overwrite window variables (or functions).
Any function, including the window object, can overwrite your global variables and functions.

The Lifetime of JavaScript Variables
The lifetime of a JavaScript variable starts when it is declared.

Function (local) variables are deleted when the function is completed.

In a web browser, global variables are deleted when you close the browser window (or tab).

JavaScript Code Blocks
Curly Braces
A code block or block statement is a group of statements enclosed within curly braces { }.

Code blocks are important for controlling the flow of execution and defining variable scope within a JavaScript program.

Code Blocks and Statements
Code blocks allows for multiple statements to be treated as a single unit.

The body of a JavaScript function is always enclosed within a code block:

Example:*/
function myFunctio(p1, p2) {
  return p1 * p2;
}

let result = myFunctio(4, 3);
document.getElementById("a3").innerHTML = "The result is: " + result;
// Code blocks are essential for if statements:

// Example:
const hour = new Date().getHours(); 
let greeting;

if (hour < 18) {
  greeting = "Good day";
} else {
  greeting = "Good evening";
}

document.getElementById("a4").innerHTML = greeting;

// Code blocks are essential for loop statements:

// Example
let text = "";

for (let i = 0; i < 5; i++) {
  text += "The number is " + i + "<br>";
}

document.getElementById("a5").innerHTML = text;

let text1 = "";

let i = 0;
while (i < 10) {
  text1 += "The number is " + i + "<br>";
  i++;
}

document.getElementById("a6").innerHTML = text1;

/*Defining Scope
Variables declared with let and const inside a code block are "block-scoped," meaning they are only accessible within that specific block.

This helps prevent unintended variable overwrites and promotes better code organization:

Example*/
{
  let x = 10;
  // x is accessible here
}

// x is not accessible here
document.getElementById("a7").innerHTML = "x is " + typeof x;

/*Standalone Blocks
Code blocks can also exist independently without being attached to an if statement, a function or a loop.

This can be used to create a scope for let and const variables.*/

{
  let x = 10;
  let y = 100;
  let areal = x * y;
  document.getElementById("a8").innerHTML = "Areal is " + areal;
}
/*This example above demonstrates how a standalone block can be used to limit the scope of variables.

Encapsulation
Variables inside the block are only available in the block.

This prevents "polluting" the global scope, keeps the code clean, and reduces the risk of name collisions.

Temporary Use
If you only need variables for a calculation, a block lets you declare them, use them, and discard them.

Organized Code
You can group related variables and statements in their own scope to avoid accidental name conflict without forcing them into a function or an object.

This improves readability and avoids accidental name conflictre-use of variable names outside the block.

JavaScript Hoisting
Hoisting is JavaScript's default behavior of moving declarations to the top.

JavaScript Declarations are Hoisted
In JavaScript, a variable can be declared after it has been used.

In other words; a variable can be used before it has been declared.

Example 1 gives the same result as Example 2:

Example 1
*/
x = 5; // Assign 5 to x

elem = document.getElementById("a9"); // Find an element 
elem.innerHTML = x;           // Display x in the element

var x; // Declare x

// Example 2

var x; // Declare x
x = 5; // Assign 5 to x

elem = document.getElementById("a10"); // Find an element 
elem.innerHTML = x;           // Display x in the element
/*To understand this, you have to understand the term "hoisting".

Hoisting is JavaScript's default behavior of moving all declarations to the top of the current scope (to the top of the current script or the current function).

The let and const Keywords
Variables defined with let and const are hoisted to the top of the block, but not initialized.

Meaning: The block of code is aware of the variable, but it cannot be used until it has been declared.

Using a let variable before it is declared will result in a ReferenceError.

The variable is in a "temporal dead zone" from the start of the block until it is declared:

Example
This will result in a ReferenceError:
carName = "Volvo";
let carName;
Using a const variable before it is declared, is a syntax error, so the code will simply not run.

Example
This code will not run.

carName = "Volvo";
const carName;
Read more about let and const in JS Let / Const.

*/

/*JavaScript Initializations are Not Hoisted
JavaScript only hoists declarations, not initializations.

Example 1 does not give the same result as Example 2:

Example 1*/
var x1 = 5; // Initialize x
var y1 = 7; // Initialize y

elem = document.getElementById("a11"); // Find an element 
elem.innerHTML = x1 + " " + y1;       // Display x and y

// Example 2

var x2= 5;  // Initialize x

elem = document.getElementById("a12");      // Find an element 
elem.innerHTML = "x is " + x2 + " and y is " + y2;  // Display x and y

var y2 = 7;  // Initialize y
/*Does it make sense that y is undefined in the last example?

This is because only the declaration (var y), not the initialization (=7) is hoisted to the top.

Because of hoisting, y has been declared before it is used, but because initializations are not hoisted, the value of y is undefined.

Example 2 is the same as writing:*/ 
var xa = 5; // Initialize x
var ya;   // Declare y

elem = document.getElementById("a13"); // Find an element 
elem.innerHTML = xa + " " + ya;       // Display x and y

ya = 7;   // Assign 7 to y
/*Declare Your Variables At the Top !
Hoisting is (to many developers) an unknown or overlooked behavior of JavaScript.

If a developer doesn't understand hoisting, programs may contain bugs (errors).

To avoid bugs, always declare all variables at the beginning of every scope.

Since this is how JavaScript interprets the code, it is always a good rule.

JavaScript in strict mode does not allow variables to be used if they are not declared.
Study "use strict" in the next chapter.*/

/*JavaScript Use Strict
The "use strict" Directive
The "use strict" directive was new in ECMAScript version 5.

It defines that JavaScript code should be executed in "strict mode".

It is not a statement. It is a literal expression, ignored by earlier versions of JavaScript.

The purpose of "use strict" is to indicate that the code should be executed in "strict mode".

With strict mode, you can not, for example, use undeclared variables.

Declaring Strict Mode
Strict mode is declared by adding "use strict"; to the beginning of a script or a function.

Declared at the beginning of a script, it has global scope (all code in the script will execute in strict mode):

Example*/
 "use strict";
x = 3.14;       // This will cause an error because x is not declared
"use strict";
myFunction();

function myFunction() {
  y = 3.14;   // This will also cause an error because y is not declared
}
// Declared inside a function, it has local scope (only the code inside the function is in strict mode):

x = 3.14;       // This will not cause an error.
myFunction();

function myFunction() {
  "use strict";
  y = 3.14;   // This will cause an error
}
/*The "Use strict";Suntax

The syntax, for declaring strict mode, was designed to be compatible with older versions of JavaScript.

Compiling a numeric literal (4 + 5;) or a string literal ("John Doe";) in a JavaScript program has no side effects. It simply compiles to a non existing variable and dies.

So "use strict"; only matters to new compilers that "understand" the meaning of it.

Why Strict Mode?
Strict mode makes it easier to write "secure" JavaScript.

Strict mode changes previously accepted "bad syntax" into real errors.

As an example, in normal JavaScript, mistyping a variable name creates a new global variable. In strict mode, this will throw an error, making it impossible to accidentally create a global variable.

In normal JavaScript, a developer will not receive any error feedback assigning values to non-writable properties.

In strict mode, any assignment to a non-writable property, a getter-only property, a non-existing property, a non-existing variable, or a non-existing object, will throw an error.

Not Allowed in Strict Mode
Using a variable, without declaring it, is not allowed:*/
"use strict";
x = 3.14;     
/*Objects are variables too.

Using an object, without declaring it, is not allowed:*/
"use strict";
x = {p1:10, p2:20};      // This will cause an error
// Deleting a variable (or object) is not allowed.

"use strict";
let x = 3.14;
delete x;                // This will cause an error

// Deleting a function is not allowed.

"use strict";
function x(p1, p2) {};
delete x;                // This will cause an error 

// Duplicating a parameter name is not allowed:

"use strict";
function x(p1, p1) {};   // This will cause an error

// Octal numeric literals are not allowed:

"use strict";
// let x = 010;             // This will cause an error

// Octal escape characters are not allowed:

"use strict";
// let x ="\010";            // This will cause an error

// Writing to a read-only property is not allowed:

"use strict";
const obj = {};
Object.defineProperty(obj, "x", {value:0, writable:false});

obj.x = 3.14;            // This will cause an error

// Writing to a get-only property is not allowed:

"use strict";
const obj = {get x() {return 0} };

obj.x = 3.14;            // This will cause an error

// Deleting an undeletable property is not allowed:

"use strict";
delete Object.prototype; // This will cause an error

// The word eval cannot be used as a variable:

"use strict";
let eval = 3.14;         // This will cause an error

// The word arguments cannot be used as a variable:

"use strict";
let arguments = 3.14;    // This will cause an error

// The with statement is not allowed:

"use strict";
with (Math){x = cos(2)}; // This will cause an error

// For security reasons, eval() is not allowed to create variables in the scope from which it was called.

// In strict mode, a variable can not be used before it is declared:

"use strict";
eval ("x = 2");
alert (x);      // This will cause an error

// In strict mode, eval() can not declare a variable using the var keyword:

"use strict";
eval ("var x = 2");
alert (x);    // This will cause an error

// eval() can not declare a variable using the let keyword:

eval ("let x = 2");
alert (x);        // This will cause an error

// The this keyword in functions behaves differently in strict mode.

// The this keyword refers to the object that called the function.

// If the object is not specified, functions in strict mode will return undefined and functions in normal mode will return the global object (window):

"use strict";
function myFunction() {
  alert(this); // will alert "undefined"
}
myFunction();
