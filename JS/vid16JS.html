    <!-- Parameters vs. Arguments
In JavaScript, function parameters and arguments are distinct concepts:

Parameters are the names listed in the function definition.

Arguments are the real values passed to, and received by the function.

Example -->

<script>
  function  multiply(a,b){
          return a*b;
  }
  let result=multiply(12,10);
  document.getElementById("0").innerHTML=result; 
  /*In the example above:

a and b are parameters
12 and 10 are arguments
The argument 12 is assigned to the parameter a.

The argument 10 is assigned to the parameter b.

The Arguments Object
JavaScript functions have a built-in object called the arguments object.

The argument object contains an array of the arguments used when the function was called (invoked).

This way you can simply use a function to find (for instance) the highest value in a list of numbers:

Example*/
x = findMax(1, 123, 500, 115, 44, 88);

function findMax() {
  let max = -Infinity;
  for (let i = 0; i < arguments.length; i++) {
    if (arguments[i] > max) {
      max = arguments[i];
    }
  }
  return max;
}

x1 = sumAll(1, 123, 500, 115, 44, 88);

function sumAll() {
  let sum = 0;
  for (let i = 0; i < arguments.length; i++) {
    sum += arguments[i];
  }
  return sum;
}

document.getElementById("1").innerHTML="The max num is: "+x+"<br> The arguments sum is :"+x1;

/*Argument Rules
JavaScript function definitions do not specify data types for arguments.

JavaScript functions do not perform type checking on the passed arguments.

JavaScript functions do not check the number of arguments received.

Incorrect Arguments
Incorrect arguments can return incorrect answers:

Example
*/
function toCelsius(fahrenheit) {
  return (5/9) * (fahrenheit-32);
} 
  let value = toCelsius("John");
document.getElementById("3").innerHTML = value;
/*Missing Arguments
If a function is called with fewer arguments than parameters, the missing values become undefined.

Example*/
 function multiply(a, b) {
  return a * b;
}

let d=multiply(4);
document.getElementById("4").innerHTML=d;
// In the example above, b is undefined, so the result is NaN.
/*Note
A JavaScript function does not perform any checking on parameter values (arguments).

Default Parameters
If a function is called with missing arguments (less than declared), the missing values are set to undefined.

Sometimes this is acceptable, but sometimes it is better to assign a default value to the parameter:

Example*/
function myFunction(x, y) {
  if (y === undefined) {
    y = 2;
  }
  return x*y;
}

document.getElementById("5").innerHTML = myFunction(4);
/*Default Parameter Values
ECMAScript 2015 allows function parameters to have default values.

You can now set a default value for a parameter.

The default value is used if no argument is provided.

Example
If y is not passed or undefined, then y = 10.*/
 function myFunction(x, y = 10) {
  return x + y;
}
document.getElementById("6").innerHTML = myFunction(5);
/*Function Rest Parameter
The rest parameter (...) allows a function to treat an indefinite number of arguments as an array:

Example*/
 function sums(...args){
let sums=0;
for (let arg of args) sums += arg;
    return sums;
 }
 let x2 = sums(4, 9, 16, 25, 29, 100, 66, 77);
document.getElementById("7").innerHTML=x2;
/*Arguments are Passed by Value
The parameters, in a function call, are the function's arguments.

JavaScript arguments are passed by value: The function only gets to know the values, not the argument's locations.

If a function changes an argument's value, it does not change the parameter's original value.

Changes to arguments are not visible (reflected) outside the function.

Objects are Passed by Reference
In JavaScript, object references are values.

Because of this, objects will behave like they are passed by reference:

If a function changes an object property, it changes the original value.

Changes to object properties are visible (reflected) outside the function.


Common Mistakes
Confusing Parameters and Arguments
Parameters are names.
Arguments are values.
Forgetting the Order
Arguments are assigned by position.
Missing Arguments
Use default values to avoid undefined.

What is a Function Expression?
A function expression is a function stored in a variable.*/

document.getElementById("8").innerHTML=multiplya;
// After a function expression has been stored in a variable, the variable can be used as a function:
// Example

document.getElementById("9").innerHTML=x4;
/*Anonymous Functions
Function expressions are commonly used to create anonymous functions.

The function above is actually function without a name.

Functions stored in variables do not need names.

The variable name is used to call the function.

Note
But, function expressions can also be a named:

const add = function add(a, b) {return a + b;};*/
/*Function Expressions Use Semicolons
A function expression is a JavaScript statement.

That is why it usually ends with a semicolon.

Example*/

const add = function(a, b) {
  return a + b;
};
let n=add(12,3);
document.getElementById("10").innerHTML=n;

/*Function Expressions Use Semicolons
A function expression is a JavaScript statement.

That is why it usually ends with a semicolon.

Example*/
const add1 = function(a, b) {
  return a + b;
};
let h=add1(23,2);
document.getElementById("11").innerHTML=h;
/*Functions Stored in Variables
Because a function expression is stored in a variable, it can be used like a value.
This is useful when passing functions to other functions (callbacks).

A function expression can be assigned to a variable, passed as an argument to another function, or returned from a function.

Example*/

function run(fn) {
  return fn();
}

const sayHello = function() {
  return "Hello";
};

let j=run(sayHello);
document.getElementById("12").innerHTML=j;

The difference is when they become available in your code.

Function Declarations vs Function Expression
A function declaration (or simply a function) is defined using:

The function keyword
A function name
Parameters in parentheses

Function expressions can not be called before they are defined.

Function declarations are "hoisted" to the top of their scope. This means you can call a function before it is defined in the code:

*/

An arrow function uses the => symbol.

An arrow function is always written as a function expression.

Example*/

};
