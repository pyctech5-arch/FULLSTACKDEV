<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non premitive data types</title>
</head>
<body>
    <script>
        var car=["Ertiga","Xuv","Fortuner"];
        //for printing complete car array
    document.write(car);
//for printing first car array
    document.write("<br>");
    document.write(car[0]);
    document.write("<br>");
//for printing second car array
    document.write(car[1]);
//for printing third car array
    document.write("<br>");
    document.write(car[2]);
//for printing fourth car array whitch is undefined
    document.write("<br>");
    document.write(car[3]);


// Object
// we can add different data type values but not in arrays it contain same datatype elements.
var person={name:"Prashant",
phno:993302211,
study:"CS"
};
    document.write("<br>");
// complete obj printing
    document.write(person);
    document.write("<br>");
// name in obj printing
    document.write("<br>");
document.write(person.name+" is my name");
    document.write("<br>");

// phno in obj printing
document.write(person.phno+" is my num  "+person.study+" And iam studying");
    document.write("<br>");
// study in obj printing
document.write(person.study);
    document.write("<br>");


    </script>
</body>
</html>
