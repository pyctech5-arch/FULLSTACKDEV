    <!-- in javascript data types  two are there 
     1.premitive datatypes:int,char,float,boolean,double etc.
     2.Non premitive datatypes:collection of aboves ex:arrays ,string,interface,enums-->
<!-- But in javascript a variable can hold all data types without specifying it. -->

<!-- Example of premitive datatypes -->
 <script>
     var x="hello";//string
     var n=70;//int
     var yes="true";//boolean /true/1
     var no="false";//boolean /false/0
     var e=undefined;
     document.write(e+"<br>");//undefiend value is same if u declared or not
     var y;
     document.write(y+"<br>");
     var z=null;
     document.write(z);

 </script>
