<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS RegExp</title>
</head>
<!-- Regular Expressions
A Regular Expression is a sequence of characters that forms a search pattern.

Regex is a common shorthand for a regular expression.

JavaScript RegExp is an Object for handling Regular Expressions.

RegExp are be used for:

Text searching
Text replacing
Text validation -->
<body>
    <script>
        /*Example explained:

/w3schools/i  is a regular expression.

w3schools  is a pattern (to be used in a search).

i  is a modifier (modifies the search to be case-insensitive).*/ 

/*Using String Methods
Regular expressions are often used with the string methods:

Method	Description
match(regex)	Returns an Array of results
replace(regex)	Returns a new String
search(regex)	Returns the index of the first match*/

        let text= "Visit W3Schools!";
        let n=text.search(/w3schools/i);
document.write("The  string is :"+text);
document.write("<br>");

        document.write("For searching the string position in the variable using .search(/w3Schools/i): "+n);

document.write("<br>");
document.writeln("Search for 'w3Schools' and display the first match :"+text.match(/W3Schools/));
document.write("<br>");
/*Using String replace()
Replace Microsoft with W3Schools in a string:*/ 
let str1="Visit Microsoft!";
document.write("<br>");
document.write("second string is:"+str1);
document.write("<br>");
document.write("Changed using the using .replace(): "+str1.replace(/Microsoft/i,"W3schools"));
document.write("<br>");
/*RexExp Alternation (OR)
In a regular expression an alternation is denoted with a vertical line character |.

An alternation matches any of the alternatives separated with |.*/ 
let text1 = "Black, white, red, green, blue, yellow.";
let result = text1.match(/red|green|blue/g)
document.write("This is using .match(|): "+result);

/*Flag	Description
/g	Performs a global match (find all)
/i	Performs case-insensitive matching
/u	Enables Unicode support (new 2015)*/ 

// RexExp Metacharacters
/*Metacharacters are characters with a special meaning.

They can be used to match digits, words, spaces, and more.

These are the most common:

Meta	Description
\d	Matches Digits
\w	Matches Words
\s	Matches Spaces
*/
//  RegExp \d (digits) Metacharacter
// A global search for digits in a string:
document.writeln("<br>");
let srt="Give 100";
const patern=/\d/g;
const patern1=/\w/g;
let result2=srt.match(patern1);
let result1=srt.match(patern);
document.write("A global search for digits in a string: "+result1);
document.writeln("<br>");
document.write("A global search for word in a string: "+result2);

    </script>
</body>
</html>
