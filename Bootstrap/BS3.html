<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS utilities-(Borders)</title>
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <!-- the below will over return by bootstrap calss adding below to h1 tag -->
    <!-- <style>
        h1{
            text-align: center;
        }
    </style> -->
</head>
<body>

    <h1 class="text-center">Example Borders</h1>
<br>
    <div class="text-center">
            <!-- to remove border -->
        <button class="border-0">border</button>
            <!-- to remove border top-->
             <button class="border-top-0">border top</button>
                <!-- to remove border bottom-->
             <button class="border-bottom-0">border bottom</button>
                <!-- to remove border right-->
             <button class="border-start-0">border right</button>
             <!-- to remove border left-->
             <button class="border-end-0">border left</button>  
        </div>
<br>
        <div class="text-center">
            <!-- to round border  // add border radius-->
        <button class="rounded">border</button>" "
          <!-- to round border top // add border radius-->
        <button class="rounded-top">border t</button>" "
          <!-- to round border bottom // add border radius-->
        <button class="rounded-bottom">border b</button>" "
                  <!-- to round border right // add border radius-->
        <button class="rounded-end">border r</button>" "
                 <!-- to round border left // add border radius-->
        <button class="rounded-start">border l</button><br><br>
                 <!-- to not rounded border // remove border radius-->
        <button class="rounded-0">no round</button>
            <br><br>
            <!-- border radius 100 -->
        <button class="rounded-circle">border circle</button>
        </div>
</body>
</html>
