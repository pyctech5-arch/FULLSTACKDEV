<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spread operator</title>
</head>
<body>
    <script>
        /*Spread Operator
The JavaScript spread operator (...) allows us to quickly copy all or part of an existing array or object into another array or object.

Example*/
 const numbersOne = [1, 2, 3];
const numbersTwo = [4, 5, 6];
const numbersCombined = [...numbersOne, ...numbersTwo];

document.write("two arrays elements: "+numbersCombined);
/*The spread operator is often used in combination with destructuring.

Example
Assign the first and second items from numbers to variables and put the rest in an array:*/ 

const numbers = [1, 2, 3, 4, 5, 6];

const [one, two, ...rest] = numbers;
document.write("<br>");
document.write("Destructured array  to get two values only and rest seperated :"+one,two+" and "+rest);
document.write("<br>");


// We can use the spread operator with objects too:

// Example
// Combine these two objects:

const car = {
  brand: 'Ford',
  model: 'Mustang',
  color: 'red'
}

const car_more = {
  type: 'car',
  year: 2021, 
  color: 'yellow'
}

const mycar = {...car, ...car_more}

document.write("the destructuring using spread in obj:  "+mycar);
    console.log(mycar);
    
    </script>
</body>
</html>
